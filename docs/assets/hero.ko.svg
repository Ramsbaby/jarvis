  <!-- 통계 1: $0 -->
  <rect x="470" y="18" width="88" height="124" rx="8" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="514" y="70" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="30" font-weight="700" fill="#58a6ff">$0</text>
  <text x="514" y="92" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="10" fill="#8b949e">월 추가 비용</text>
  <text x="514" y="112" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="9" fill="#388bfd">API 키 불필요</text>

  <!-- 통계 2: 98% -->
  <rect x="570" y="18" width="88" height="124" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="614" y="70" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
