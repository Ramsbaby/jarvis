  <!-- 구분선 -->
  <line x1="32" y1="106" x2="360" y2="106" stroke="#21262d" stroke-width="1"/>

  <!-- 태그라인 -->
  <text x="32" y="128"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
