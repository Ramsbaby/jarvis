<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="200" fill="url(#accent)" rx="2"/>

  <!-- Main title: Jarvis -->
  <text x="48" y="80" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">Jarvis</text>

  <!-- Subtitle -->
  <text x="48" y="114" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="16" font-weight="400" fill="#8b949e">24/7 AI Ops on Your Claude Max Subscription</text>

  <!-- Divider line -->
  <line x1="48" y1="134" x2="340" y2="134" stroke="#30363d" stroke-width="1"/>

  <!-- Tagline -->
  <text x="48" y="158" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="13" fill="#58a6ff">claude -p · Discord · cron · local RAG · self-healing</text>

  <!-- Stat box 1: $0/month -->
  <rect x="450" y="30" width="90" height="62" fill="#161b22" rx="8" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="495" y="58" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="18" font-weight="700" fill="#58a6ff" text-anchor="middle">$0</text>
  <text x="495" y="74" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="11" fill="#8b949e" text-anchor="middle">/month extra</text>

  <!-- Stat box 2: 98% compression -->
  <rect x="554" y="30" width="90" height="62" fill="#161b22" rx="8" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="599" y="58" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="18" font-weight="700" fill="#58a6ff" text-anchor="middle">98%</text>
  <text x="599" y="74" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="11" fill="#8b949e" text-anchor="middle">compression</text>

  <!-- Stat box 3: 76 cron tasks -->
  <rect x="658" y="30" width="90" height="62" fill="#161b22" rx="8" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="703" y="58" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="18" font-weight="700" fill="#58a6ff" text-anchor="middle">76</text>
  <text x="703" y="74" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="11" fill="#8b949e" text-anchor="middle">cron tasks</text>

  <!-- Bottom labels -->
  <text x="495" y="120" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="10" fill="#30363d" text-anchor="middle">No API keys needed</text>
  <text x="599" y="120" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="10" fill="#30363d" text-anchor="middle">315 KB → 5.4 KB</text>
  <text x="703" y="120" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="10" fill="#30363d" text-anchor="middle">12 AI teams</text>

  <!-- Version tag -->
  <text x="752" y="188" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="10" fill="#30363d" text-anchor="end">Ramsbaby/jarvis</text>
</svg>
