# Jarvis — Docker Compose
# Windows/Linux 설치: docker compose up -d

services:
  jarvis:
    build: .
    container_name: jarvis
    restart: unless-stopped
    env_file: .env
    environment:
      - JARVIS_HOME=/jarvis
      - NODE_ENV=production
    volumes:
      # Claude CLI 인증 (macOS/Linux 전용. Windows 비WSL2 환경에서는 제거 또는 주석 처리)
      # Windows 비WSL2: HOME 환경변수가 Linux 경로로 미설정 시 마운트 실패
      # Windows CMD: set HOME=C:\Users\USERNAME 후 docker compose up
      # WSL2/Linux: 자동 확장됨 (정상)
      - ${HOME}/.claude:/root/.claude:ro
      # 데이터 영속화
      - ./rag:/jarvis/rag
      - ./inbox:/jarvis/inbox
      - ./logs:/jarvis/logs
      - ./context:/jarvis/context
      - ./state:/jarvis/state
      - ./results:/jarvis/results
      - ./plugins:/jarvis/plugins:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
