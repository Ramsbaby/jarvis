name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          find bin/ lib/ scripts/ -name '*.sh' -type f | while read -r f; do
            echo "Checking $f"
            shellcheck -e SC1091,SC2034 "$f" || true
          done

  node-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: discord
        run: npm ci --ignore-scripts
      - name: Syntax check
        run: |
          find discord/ -not -path '*/node_modules/*' \( -name '*.js' -o -name '*.mjs' \) | while read -r f; do
            echo "Checking $f"
            node --check "$f"
          done
      - name: Smoke test (no Discord token required)
        run: node discord/cli-test.js --smoke-test
