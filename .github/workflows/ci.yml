name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Syntax

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: discord/package*.json

      - name: Install dependencies
        run: |
          if [ -f discord/package.json ]; then
            npm ci --prefix discord 2>/dev/null || npm install --prefix discord
          fi

      - name: Check required files
        run: |
          echo "Checking core files..."
          test -f discord/discord-bot.js      && echo "✅ discord-bot.js"
          test -f discord/lib/claude-runner.js && echo "✅ claude-runner.js"
          test -f install.sh                  && echo "✅ install.sh"
          test -f discord/.env.example        && echo "✅ .env.example"
          echo "Core file check passed"

      - name: JS syntax check
        run: |
          echo "Checking JavaScript syntax..."
          find discord -name "*.js" -not -path "*/node_modules/*" | while read f; do
            node --check "$f" && echo "✅ $f" || { echo "❌ $f"; exit 1; }
          done
          echo "JS syntax check passed"

      - name: Shell script syntax check
        run: |
          echo "Checking shell script syntax..."
          for f in install.sh setup.sh docker-entrypoint.sh; do
            [ -f "$f" ] && bash -n "$f" && echo "✅ $f"
          done
          echo "Shell syntax check passed"

      - name: Validate config examples
        run: |
          echo "Validating JSON examples..."
          shopt -s nullglob
          for f in config/*.json.example config/*.json; do
            python3 -m json.tool "$f" > /dev/null && echo "✅ $f" || true
          done
          echo "Config validation passed"

  install-test:
    runs-on: ubuntu-latest
    name: Install & E2E

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: discord/package*.json

      - name: Install system deps (jq)
        run: sudo apt-get install -y jq

      - name: Mock claude CLI (CI — binary presence check only)
        run: |
          sudo bash -c 'printf "#!/bin/bash\necho \"claude mock (CI)\"\n" > /usr/local/bin/claude && chmod +x /usr/local/bin/claude'
          claude --version || claude  # verify mock works

      - name: Run install.sh (non-interactive, tier 2)
        run: echo "n" | bash install.sh --local --tier 2
        timeout-minutes: 5

      - name: Install devDependencies (eslint — skipped by install.sh --production)
        run: npm install --prefix discord --include=dev

      - name: Run E2E test suite
        run: bash scripts/e2e-test.sh
        env:
          GITHUB_ACTIONS: true
